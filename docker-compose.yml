services:
  postgres:
    image: postgres:16
    container_name: last-call-market-postgres
    environment:
      POSTGRES_DB: last_call_market
      POSTGRES_USER: last_call
      POSTGRES_PASSWORD: last_call
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U last_call -d last_call_market"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:

